# WTG GPU Redline Home Assistant package
#
# Minimal first-pass package for WTG MQTT telemetry.
#
# Assumed WTG MQTT state topic:
#   wtg/bench1/gpu0/state
#
# Assumed WTG payload fields:
#   host
#   gpu_index
#   gpu_name
#   driver_version
#   util_gpu_pct
#   util_mem_controller_pct
#   vram_used_mib
#   vram_total_mib
#   power_w
#   power_limit_w
#   temp_c
#   perf_state
#
# WTG publishes raw telemetry. Home Assistant derives display states.
# Display sequence:
#   IDLE -> LOAD -> MAX -> LIMIT -> SUS
#
# SUS is an override, not a higher load state.

mqtt:
  sensor:
    - name: "WTG Bench GPU Utilization"
      unique_id: wtg_bench1_gpu0_util_gpu_pct
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.util_gpu_pct }}"
      unit_of_measurement: "%"
      state_class: measurement

    - name: "WTG Bench Memory Controller"
      unique_id: wtg_bench1_gpu0_util_mem_controller_pct
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.util_mem_controller_pct }}"
      unit_of_measurement: "%"
      state_class: measurement

    - name: "WTG Bench VRAM Used"
      unique_id: wtg_bench1_gpu0_vram_used_mib
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.vram_used_mib }}"
      unit_of_measurement: "MiB"
      state_class: measurement

    - name: "WTG Bench VRAM Total"
      unique_id: wtg_bench1_gpu0_vram_total_mib
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.vram_total_mib }}"
      unit_of_measurement: "MiB"
      state_class: measurement

    - name: "WTG Bench Power"
      unique_id: wtg_bench1_gpu0_power_w
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.power_w }}"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "WTG Bench Power Limit"
      unique_id: wtg_bench1_gpu0_power_limit_w
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.power_limit_w }}"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "WTG Bench Temperature"
      unique_id: wtg_bench1_gpu0_temp_c
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.temp_c }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement

    - name: "WTG Bench Perf State"
      unique_id: wtg_bench1_gpu0_perf_state
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.perf_state }}"

    - name: "WTG Bench GPU Name"
      unique_id: wtg_bench1_gpu0_gpu_name
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.gpu_name }}"

    - name: "WTG Bench Driver Version"
      unique_id: wtg_bench1_gpu0_driver_version
      state_topic: "wtg/bench1/gpu0/state"
      value_template: "{{ value_json.driver_version }}"

template:
  - binary_sensor:
      - name: "WTG Bench SUS"
        unique_id: wtg_bench1_gpu0_sus
        state: >
          {% set gpu = states('sensor.wtg_bench_gpu_utilization') | float(999) %}
          {% set mem = states('sensor.wtg_bench_memory_controller') | float(0) %}
          {% set power = states('sensor.wtg_bench_power') | float(999) %}
          {% set vram_used = states('sensor.wtg_bench_vram_used') | float(999999) %}
          {% set vram_total = states('sensor.wtg_bench_vram_total') | float(1) %}
          {% set vram_pct = (vram_used / vram_total * 100) if vram_total > 0 else 100 %}
          {{ gpu <= 3 and mem >= 95 and power <= 35 and vram_pct <= 10 }}
        icon: >
          {% if is_state('binary_sensor.wtg_bench_sus', 'on') %}
            mdi:alert-circle
          {% else %}
            mdi:check-circle
          {% endif %}

  - sensor:
      - name: "WTG Bench Redline Score"
        unique_id: wtg_bench1_gpu0_redline_score
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set gpu = states('sensor.wtg_bench_gpu_utilization') | float(0) %}
          {% set mem = states('sensor.wtg_bench_memory_controller') | float(0) %}
          {% set power = states('sensor.wtg_bench_power') | float(0) %}
          {% set limit = states('sensor.wtg_bench_power_limit') | float(0) %}
          {% set temp = states('sensor.wtg_bench_temperature') | float(0) %}
          {% set power_pct = (power / limit * 100) if limit > 0 else 0 %}
          {% set activity = [gpu, mem] | max %}
          {% set score = (activity * 0.55) + (power_pct * 0.35) %}
          {% if temp >= 83 %}
            {% set score = score + 15 %}
          {% elif temp >= 75 %}
            {% set score = score + 8 %}
          {% endif %}
          {{ [0, [score, 100] | min] | max | round(0) }}

      - name: "WTG Bench Redline State"
        unique_id: wtg_bench1_gpu0_redline_state
        state: >
          {% set score = states('sensor.wtg_bench_redline_score') | float(0) %}
          {% set power = states('sensor.wtg_bench_power') | float(0) %}
          {% set limit = states('sensor.wtg_bench_power_limit') | float(0) %}
          {% set temp = states('sensor.wtg_bench_temperature') | float(0) %}
          {% set power_ratio = (power / limit) if limit > 0 else 0 %}
          {% if is_state('binary_sensor.wtg_bench_sus', 'on') %}
            SUS
          {% elif power_ratio >= 0.97 or temp >= 83 %}
            LIMIT
          {% elif score >= 75 %}
            MAX
          {% elif score >= 20 %}
            LOAD
          {% else %}
            IDLE
          {% endif %}
        icon: >
          {% if is_state('sensor.wtg_bench_redline_state', 'IDLE') %}
            mdi:gauge-empty
          {% elif is_state('sensor.wtg_bench_redline_state', 'LOAD') %}
            mdi:gauge-low
          {% elif is_state('sensor.wtg_bench_redline_state', 'MAX') %}
            mdi:gauge-full
          {% elif is_state('sensor.wtg_bench_redline_state', 'LIMIT') %}
            mdi:thermometer-alert
          {% elif is_state('sensor.wtg_bench_redline_state', 'SUS') %}
            mdi:alert-circle
          {% else %}
            mdi:gauge
          {% endif %}
