# WTG GPU Redline basic dashboard card
#
# Stock Home Assistant cards only. No custom cards required.
#
# Requires packages/wtg_gpu_redline.yaml or equivalent Redline entities.
#
# This dashboard example consumes the Redline output entities created by the
# package. It does not reference WTG source telemetry entities directly and
# does not require hostname edits.

- type: gauge
  entity: sensor.wtg_redline_score
  name: WTG GPU Redline
  min: 0
  max: 100
  needle: true
  severity:
    green: 0
    yellow: 20
    red: 85

- type: entities
  title: WTG GPU Redline
  entities:
    - entity: sensor.wtg_redline_state
      name: State
    - entity: sensor.wtg_redline_score
      name: Redline Score
    - entity: binary_sensor.wtg_redline_sus
      name: SUS Override
    - entity: sensor.wtg_redline_summary
      name: Summary
