# WTG GPU Redline basic dashboard card
#
# Stock Home Assistant cards only. No custom cards required.
#
# Requires packages/wtg_gpu_redline.yaml or equivalent entities.

- type: gauge
  entity: sensor.wtg_bench_redline_score
  name: WTG GPU Redline
  min: 0
  max: 100
  needle: true
  severity:
    green: 0
    yellow: 20
    red: 85

- type: entities
  title: WTG GPU Redline
  entities:
    - entity: sensor.wtg_bench_redline_state
      name: State
    - entity: sensor.wtg_bench_redline_score
      name: Redline Score
    - entity: binary_sensor.wtg_bench_sus
      name: SUS Override
    - entity: sensor.wtg_bench_gpu_utilization
      name: GPU
    - entity: sensor.wtg_bench_memory_controller
      name: Memory Controller
    - entity: sensor.wtg_bench_power
      name: Power
    - entity: sensor.wtg_bench_power_limit
      name: Power Limit
    - entity: sensor.wtg_bench_temperature
      name: Temperature
    - entity: sensor.wtg_bench_perf_state
      name: Perf State
